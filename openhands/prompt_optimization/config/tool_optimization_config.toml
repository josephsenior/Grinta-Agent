# Tool-Specific Prompt Optimization Configuration
# This file contains optimized descriptions and parameters for various tools

[think_tool]
description = """Use this tool to engage in deep analytical thinking and problem-solving. This tool is essential for complex reasoning, strategic planning, and systematic analysis.

**When to use:**
- Analyzing complex problems that require multi-step reasoning
- Brainstorming multiple solution approaches and evaluating tradeoffs
- Planning architectural decisions and implementation strategies
- Debugging intricate issues by organizing thoughts and hypotheses
- Exploring repository structures to understand codebases
- Evaluating test results and devising fix strategies

**Best practices:**
- Be specific and detailed in your thinking process
- Break down complex problems into manageable components
- Consider multiple perspectives and potential edge cases
- Document your reasoning chain clearly
- Use this tool before making significant changes or decisions

The tool logs your thought process transparently without executing code or making changes, providing visibility into your analytical approach."""

[think_tool.parameters.thought]
description = "Your detailed analytical thought process. Include reasoning steps, considerations, tradeoffs, and conclusions. Be specific and thorough."
type = "string"

[bash_tool]
description = """Execute bash commands in a persistent shell environment with advanced capabilities and safety features.

**Core Capabilities:**
- Persistent shell session with maintained environment variables and working directory
- Single command execution with chaining support (use && or ; for multiple commands)
- Soft timeout (10s) with interactive control options
- Background process management for long-running tasks
- Input/output redirection and logging capabilities

**Command Execution Guidelines:**
- One command per execution - chain multiple commands with && or ;
- Use absolute paths when possible to maintain directory context
- For long-running processes, run in background: `command > logfile 2>&1 &`
- Set appropriate timeout values for installation or testing commands
- Avoid using `set -e`, `set -eu`, or `set -euo pipefail` (not supported)

**Interactive Process Management:**
- Exit code -1 indicates process hit soft timeout and is still running
- Use `is_input=true` to interact with running processes:
  - Empty command: retrieve additional logs
  - Text input: send to STDIN
  - Control commands: C-c (interrupt), C-d (EOF), C-z (suspend)
  - After C-c, restart with longer timeout to complete

**Security and Safety:**
- Always assess security risk level before execution
- Verify directory existence before creating files/directories
- Use appropriate timeout values to prevent hanging processes
- Redirect output for long-running commands to avoid truncation"""

[bash_tool.parameters.command]
description = "The bash command to execute. Use && or ; to chain multiple commands. Can be empty to retrieve logs from running process, or control commands like C-c to interrupt."
type = "string"

[bash_tool.parameters.is_input]
description = "Set to true to send input to a running process, false to execute a new bash command. Use when previous command returned exit code -1."
type = "string"
enum = ["true", "false"]

[bash_tool.parameters.timeout]
description = "Hard timeout in seconds for command execution. Use for commands that may run longer than the default soft timeout."
type = "number"

[bash_tool.parameters.security_risk]
description = "Assess the security risk level of this command. Choose based on potential system impact and data access."
type = "string"
enum = ["LOW", "MEDIUM", "HIGH", "CRITICAL"]
default = "LOW"

[finish_tool]
description = """Complete the current task and provide a comprehensive summary of work accomplished.

**When to use:**
- When the primary task has been successfully completed
- When all requested objectives have been achieved
- When no further action is required from the user
- When providing a final status report

**What to include:**
- Clear statement that the task is complete
- Summary of key accomplishments and changes made
- Any important findings or insights discovered
- Recommendations for next steps or follow-up actions
- List of files created, modified, or analyzed

**Best practices:**
- Be specific about what was accomplished
- Highlight any important discoveries or issues encountered
- Provide actionable next steps if applicable
- Ensure all requested deliverables are complete
- Use clear, professional language"""

[finish_tool.parameters.message]
description = "A comprehensive summary of the completed work, including accomplishments, key findings, and any recommendations for next steps."
type = "string"

[editor_tool]
description = """Edit files using precise string replacement operations with safety checks and validation.

**Core Features:**
- Exact string matching with optional regex support
- Multiple replacement operations in sequence
- Automatic backup creation before modifications
- Syntax validation for common file types
- Conflict detection and resolution
- Rollback capabilities for failed operations

**When to use:**
- Making precise, targeted changes to code
- Updating configuration files and settings
- Refactoring code with specific patterns
- Fixing bugs with exact string replacements
- Updating documentation and comments

**Safety Features:**
- Automatic backup before any changes
- Validation of file syntax after modifications
- Conflict detection for concurrent edits
- Rollback on validation failures
- Preview mode to review changes before applying

**Best practices:**
- Use specific, unique strings to avoid unintended replacements
- Test replacements on small sections first
- Always review changes before applying
- Use regex patterns for complex matching
- Keep replacement operations atomic and focused"""

[editor_tool.parameters.file_path]
description = "The absolute path to the file to edit."
type = "string"

[editor_tool.parameters.replacements]
description = "List of string replacement operations to perform."
type = "array"
items = "object"
properties = {
    old_string = { type = "string", description = "The exact string to replace" },
    new_string = { type = "string", description = "The replacement string" },
    use_regex = { type = "boolean", description = "Whether to use regex matching" }
}

[ipython_tool]
description = """Execute Python code in an interactive IPython environment with persistent state and rich output.

**Features:**
- Persistent Python environment across executions
- Rich output display including plots, tables, and formatted text
- Access to all Python libraries and packages
- Variable persistence between cell executions
- Error handling and debugging capabilities
- Integration with Jupyter-style output

**Use cases:**
- Data analysis and visualization
- Machine learning model development
- API testing and integration
- Mathematical computations and simulations
- File processing and data manipulation
- Interactive debugging and exploration

**Best practices:**
- Use descriptive variable names
- Include comments for complex logic
- Handle errors gracefully with try-except blocks
- Use appropriate data structures for your task
- Leverage Python's rich ecosystem of libraries
- Test code incrementally with small cells"""

[ipython_tool.parameters.code]
description = "Python code to execute in the IPython environment. Can include imports, function definitions, data processing, and output statements."
type = "string"

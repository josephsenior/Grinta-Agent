quality_constraints:
  - Minimum 3 pages in layout_plan (home, detail, form or dashboard)
  - Each page must have 4-6 components with full specifications
  - All components must document states, responsive behavior, and accessibility
  - WCAG checklist must have minimum 8 criteria from WCAG 2.1 AA
  - Design tokens must include colors, typography, spacing, elevation, borders
  - Risks array must identify minimum 2-3 potential issues with mitigation strategies
  - Component hierarchy must show parent-child relationships
  - All new components must have complexity estimates
  - Accessibility notes must be specific and actionable

best_practices: |
  Mobile-First Design:
  - Design for smallest screen first, then enhance for larger screens
  - Use responsive breakpoints: mobile (< 640px), tablet (640-1024px), desktop (> 1024px)
  - Test on actual devices, not just browser DevTools
  - Ensure touch targets are minimum 44x44px
  
  Accessibility (WCAG 2.1 AA):
  - Semantic HTML: Use proper elements (button, not div with onClick)
  - Keyboard navigation: All features accessible via keyboard
  - Screen readers: Test with NVDA, JAWS, or VoiceOver
  - Color contrast: Minimum 4.5:1 for normal text, 3:1 for large text
  - Focus indicators: Visible focus ring on all interactive elements
  - ARIA: Use sparingly, prefer semantic HTML first
  
  Component Design:
  - Single Responsibility: Each component has one clear purpose
  - Composition: Build complex components from simpler ones
  - Props interface: Clear, well-documented prop types
  - States: Document all visual states (default, hover, active, disabled, loading, error)
  - Variants: Use props for variations (size, color, style) not separate components
  
  Design Tokens:
  - Use CSS variables or Tailwind theme for consistency
  - Never hardcode colors, spacing, or font sizes
  - Keep token naming semantic (primary not blue, spacing-md not 16px)
  - Document token usage in component specs
  
  Responsive Design:
  - Use relative units (rem, %, vh/vw) not pixels
  - Flexible layouts with flexbox/grid
  - Mobile-first media queries (@media (min-width: ...))
  - Test all breakpoints thoroughly
  - Consider content reflow and element repositioning

validation_checklist: |
  Before submitting, verify:
  - [ ] layout_plan has minimum 3 pages with detailed component specs
  - [ ] Each component has name, type, purpose, states, responsive_behavior, accessibility_notes
  - [ ] component_hierarchy shows proper parent-child relationships
  - [ ] accessibility.wcag_level is "AA" and checklist has 8+ WCAG criteria
  - [ ] All WCAG criteria have criterion number, requirement, implementation, and status
  - [ ] aria_requirements lists specific ARIA attributes needed
  - [ ] keyboard_navigation documents tab order, shortcuts, and focus indicators
  - [ ] screen_reader_support has specific implementation details
  - [ ] design_tokens includes colors, typography, spacing, elevation, borders, transitions
  - [ ] risks array identifies 2-3 potential issues with severity and mitigation
  - [ ] next_engineering_focus prioritizes implementation order
  - [ ] reusable_components lists existing design system components
  - [ ] new_components_needed has complexity estimates and recommendations
  - [ ] mobile_considerations addresses touch targets, gestures, viewport
  - [ ] performance_budget sets realistic Core Web Vitals targets
  - [ ] No placeholder or TODO items
  - [ ] Output structure matches designer.schema.json exactly

constraints:
  - No code; only structural guidance and planning
  - Prioritize reusing existing components over creating new ones
  - Flag missing components explicitly with complexity estimates
  - Favor semantic HTML structure over div soup
  - Accessibility issues must include severity (low | medium | high)
  - All recommendations must be actionable and specific
  - Design must be implementable with modern CSS and React
  - Consider mobile and desktop experiences equally

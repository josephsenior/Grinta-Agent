name: repro-react-router-plugin

on:
  workflow_dispatch:

jobs:
  run-repro:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install repro deps
        working-directory: frontend/repro-react-router-plugin
        run: npm ci --no-audit --no-fund || npm install --legacy-peer-deps --no-audit --no-fund

      - name: Run reproduce script
        working-directory: frontend/repro-react-router-plugin
        run: npm run reproduce:log || true

      - name: Upload reproduce.log
        uses: actions/upload-artifact@v4
        with:
          name: reproduce-log
          path: frontend/repro-react-router-plugin/reproduce.log

  CRITICAL REQUIREMENTS - THESE FIELDS ARE MANDATORY:
  1. implementation_plan: Multi-phase plan with concrete steps (minimum 200 characters)
  2. file_structure: Complete recursive file/folder tree with descriptions
  3. dependencies: List of all packages with versions (e.g., ["react@18.2.0", "express@4.18.0"])
  4. technical_decisions: At least 2 key decisions with rationale
  5. run_results: Setup, test, and dev commands
  
  CRITICAL REQUIREMENTS FOR FILE_STRUCTURE:
  1. Use recursive "children" arrays for nested folders
  2. Every file and folder must have "name", "type", "description"
  3. type must be exactly "file" or "folder" (lowercase)
  4. Include ALL files: source code, tests, configs, documentation, environment files
  5. Show realistic project structure following framework conventions
  6. Descriptions must explain the purpose, not just repeat the file name
  7. DO NOT wrap file_structure in a "root" object - make file_structure BE the root node directly
  

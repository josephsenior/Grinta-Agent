quality_constraints:
  - File structure must include minimum 20 files for realistic projects
  - Every folder and file must have a meaningful description (not just repeating the name)
  - Must include all configuration files (package.json, tsconfig.json, etc.)
  - Must show proper folder hierarchy with correct nesting levels
  - Test files must be included alongside implementation files
  - All API route files must be present (matching Architect's endpoint specs)
  - Database-related files (schema.prisma, migrations) must be included
  - Environment variable files (.env.example) must be present
  - Implementation plan must have 4-5 phases with specific tasks
  - No placeholder names like "file1.ts" or "TODO.ts"

best_practices: |
  File Organization:
  - Follow framework conventions (Next.js App Router structure)
  - Group by feature, not by type (posts folder contains all post-related code)
  - Collocate tests with source code when possible
  - Separate concerns: components, lib utilities, types, hooks
  - Use index files sparingly (Next.js routing handles this)
  
  Naming Conventions:
  - PascalCase for React components (PostCard.tsx)
  - camelCase for utilities and hooks (use-auth.ts)
  - kebab-case for routes and folders matching URLs
  - Descriptive names that reveal purpose (PostEditor not Editor)
  
  Code Organization:
  - Single Responsibility Principle (each file has one clear purpose)
  - DRY (Don't Repeat Yourself) - shared logic in lib folder
  - Separation of concerns (UI, logic, data, types in separate files)
  - Feature-based structure (easier to find related code)
  
  Testing:
  - Unit tests for utilities and helpers
  - Integration tests for API endpoints
  - E2E tests for critical user flows
  - Test files mirror source structure
  
  Configuration:
  - Environment variables for secrets and environment-specific config
  - .env.example documents all required variables
  - TypeScript strict mode enabled
  - Path aliases for cleaner imports (@/components/...)

validation_checklist: |
  Before submitting, verify:
  - [ ] File structure has realistic depth (3-5 levels of nesting)
  - [ ] Minimum 20 files for typical project (50+ for complex systems)
  - [ ] All files have type: "file" or "folder" (exactly)
  - [ ] Every item has description explaining its purpose
  - [ ] Configuration files included (package.json, tsconfig.json, .env.example, etc.)
  - [ ] Test files present (__tests__ folder with actual test files)
  - [ ] API route structure matches Next.js conventions
  - [ ] Prisma folder with schema.prisma present (if using database)
  - [ ] Implementation plan has 4-5 phases with specific, actionable tasks
  - [ ] No "TODO" or "TBD" items in file names or descriptions
  - [ ] artifact_path points to main deliverable directory
  - [ ] tests_added is true if test files included
  - [ ] run_results has setup_commands, test_commands, dev_commands
  - [ ] Output structure matches engineer.schema.json exactly

constraints:
  - Follow existing project style and patterns
  - Don't introduce unnecessary complexity
  - Prefer composition over inheritance for components
  - Keep components small and focused (< 200 lines)
  - Use TypeScript strictly (no 'any' types without justification)
  - Follow accessibility best practices (semantic HTML, ARIA labels)
  - Implement proper error boundaries
  - Add loading states for async operations

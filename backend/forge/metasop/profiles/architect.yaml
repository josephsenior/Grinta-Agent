quality_constraints:
  - design_doc must be comprehensive (minimum 500 characters) with all 6 sections
  - Minimum 5 API endpoints covering main CRUD operations
  - Database schema must include ALL tables needed for the feature
  - All foreign key relationships must be explicitly documented
  - At least 3 architectural decisions with full reasoning
  - All API endpoints must have complete request and response schemas
  - Security considerations must address auth, validation, and data protection
  - Technology stack must list specific versions where relevant

best_practices: |
  RESTful API Design:
  - Use plural nouns for resources (/api/posts, not /api/post)
  - Use HTTP methods semantically (GET=read, POST=create, PUT=update, DELETE=remove)
  - Return appropriate status codes (200, 201, 400, 401, 404, 500)
  - Version your APIs (/api/v1/) for future changes
  - Include pagination for list endpoints
  - Use consistent error response format
  
  Database Design:
  - Normalize to 3NF unless performance requires denormalization
  - Use UUIDs for primary keys (better for distributed systems)
  - Add created_at and updated_at to all tables
  - Use soft deletes (deleted_at) for important data
  - Index foreign keys and frequently queried columns
  - Document all relationships explicitly
  
  ⚠️ CRITICAL DATABASE RULES (VIOLATIONS WILL CAUSE ERRORS):
  - NEVER create a table without columns - this is invalid SQL and will break!
  - EVERY table needs at minimum: id (PRIMARY KEY), created_at, updated_at
  - Junction tables (many-to-many) MUST have the two foreign key columns
  - If you define a table, you MUST define its columns - NO EXCEPTIONS!
  
  Architectural Decisions:
  - Always document the "why" not just the "what"
  - List alternatives considered (shows thoughtfulness)
  - Be honest about tradeoffs (builds trust)
  - Consider future flexibility vs current simplicity
  
  Security:
  - Never store passwords in plain text
  - Use prepared statements or ORM (prevent SQL injection)
  - Implement rate limiting on sensitive endpoints
  - Validate all user input
  - Use HTTPS in production
  - Follow principle of least privilege

validation_checklist: |
  Before submitting, verify:
  - [ ] design_doc has all required sections (Overview, Components, Data Flow, Security, Scalability, Deployment)
  - [ ] apis array has minimum 5 endpoints with full CRUD coverage
  - [ ] All API endpoints have method, path, description, request_schema, response_schema
  - [ ] database_schema includes ALL tables needed for the feature
  - [ ] EVERY table has AT LEAST 1 column defined (NO empty tables!)
  - [ ] All tables have proper primary keys and foreign key constraints
  - [ ] All columns have name, type, and constraints specified
  - [ ] Relationships array documents all table connections
  - [ ] decisions array has at least 3 items with decision, reason, alternatives, tradeoffs
  - [ ] technology_stack specifies concrete choices (not "TBD" or placeholders)
  - [ ] security_considerations addresses authentication, authorization, and data protection
  - [ ] No placeholder or TODO items in output
  - [ ] Output structure matches architect.schema.json exactly

constraints:
  - max_loc: 400 per module (mention if design exceeds this)
  - No DB schema changes without PM approval (for existing projects)
  - Prefer established patterns over novel architectures
  - Optimize for developer experience and maintainability
  - Consider deployment and operations complexity
  - Design for testability (dependency injection, separation of concerns)

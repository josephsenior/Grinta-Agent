    "decisions": [
      {
        "decision": "Use Next.js with App Router instead of separate frontend/backend",
        "reason": "Next.js App Router provides server-side rendering for SEO, API routes for backend logic, simplified deployment, and excellent developer experience. Single deployment reduces infrastructure complexity.",
        "alternatives": ["Separate React + Express apps", "Remix framework", "Traditional SSR with EJS"],
        "tradeoffs": "Couples frontend and backend deployment. Scaling frontend and backend independently requires more configuration. Vendor lock-in to Vercel for optimal performance."
      },
      {
        "decision": "PostgreSQL with Prisma ORM instead of MongoDB or raw SQL",
        "reason": "PostgreSQL provides strong consistency, complex queries, and relational integrity needed for comments/tags relationships. Prisma offers type-safe queries, automatic migrations, and excellent TypeScript integration.",
        "alternatives": ["MongoDB with Mongoose", "MySQL with TypeORM", "Raw SQL with pg driver"],
        "tradeoffs": "Prisma adds abstraction layer (slight performance overhead). PostgreSQL requires more setup than MongoDB. Schema migrations need careful management in production."
      },
      {
        "decision": "JWT tokens in httpOnly cookies instead of localStorage",
        "reason": "HttpOnly cookies prevent XSS attacks (JavaScript cannot access tokens). Automatic inclusion in requests. Server-side validation on every request. Industry best practice for web authentication.",
        "alternatives": ["JWT in localStorage", "Session-based auth with Redis", "OAuth only"],
        "tradeoffs": "Requires server-side session validation on every request. CSRF protection needed. More complex logout (must invalidate server-side). Not suitable for mobile apps without adjustments."
      },
      {
        "decision": "Role-based access control with simple user/admin roles",
        "reason": "Sufficient for blog platform requirements. Admin role can manage all content. Simple to implement and understand. Can be extended to more granular permissions later if needed.",
        "alternatives": ["Attribute-based access control (ABAC)", "Permission-based system", "No roles (owner-only access)"],
        "tradeoffs": "Less flexible than ABAC for complex permissions. All admins have same privileges. Adding new roles requires schema changes."
      }

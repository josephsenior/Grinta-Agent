# Real-Time Optimization Configuration
# Complete configuration for the most advanced real-time optimization system

[system]
# System-wide settings
max_concurrent_optimizations = 5
optimization_threshold = 0.05
confidence_threshold = 0.8
startup_delay = 1.0

[live_optimizer]
# Live optimization settings
max_concurrent_optimizations = 5
optimization_threshold = 0.05
confidence_threshold = 0.8
retry_attempts = 3
retry_delay = 1.0

[hot_swapper]
# Hot swapping settings
max_concurrent_swaps = 3
default_strategy = "atomic"  # atomic, blue_green, rolling, canary
health_check_timeout = 5.0
rollback_timeout = 10.0
max_rollback_attempts = 3

[performance_predictor]
# Performance prediction settings
model_type = "ensemble"  # random_forest, gradient_boosting, linear_regression, ensemble
retrain_frequency = 100
confidence_threshold = 0.7
prediction_cache_size = 1000
feature_importance_threshold = 0.01

[streaming_engine]
# Streaming data processing
max_queue_size = 10000
processing_batch_size = 100
processing_interval = 0.1
anomaly_threshold = 2.0
pattern_window_size = 100
max_processing_time = 5.0

[real_time_monitor]
# Real-time monitoring
update_interval = 1.0
max_history_size = 10000
trend_window_size = 100
alert_retention_days = 7
metric_retention_days = 30

[websocket_server]
# WebSocket communication
host = "localhost"
port = 8765
heartbeat_interval = 30.0
max_clients = 100
max_message_size = 1048576  # 1MB
ping_interval = 20
ping_timeout = 10

[alert_thresholds]
# Alert thresholds for different metrics
[alert_thresholds.success_rate]
warning = 0.7
error = 0.5
critical = 0.3

[alert_thresholds.execution_time]
warning = 10.0
error = 30.0
critical = 60.0

[alert_thresholds.error_rate]
warning = 0.1
error = 0.2
critical = 0.4

[alert_thresholds.composite_score]
warning = 0.6
error = 0.4
critical = 0.2

[alert_thresholds.token_cost]
warning = 0.01
error = 0.05
critical = 0.1

[optimization_strategies]
# Multi-objective optimization strategies
[optimization_strategies.balanced]
success_rate_weight = 0.4
execution_time_weight = -0.25
token_cost_weight = -0.2
error_rate_weight = -0.15

[optimization_strategies.performance_focused]
success_rate_weight = 0.5
execution_time_weight = -0.3
token_cost_weight = -0.1
error_rate_weight = -0.1

[optimization_strategies.efficiency_focused]
success_rate_weight = 0.3
execution_time_weight = -0.4
token_cost_weight = -0.2
error_rate_weight = -0.1

[optimization_strategies.innovation_focused]
success_rate_weight = 0.2
execution_time_weight = -0.1
token_cost_weight = -0.1
error_rate_weight = -0.1
innovation_score_weight = 0.5

[context_aware_optimization]
# Context-aware optimization settings
enable_context_aware = true
context_analysis_depth = 3
domain_specific_strategies = true
task_type_detection = true
urgency_handling = true

[hierarchical_optimization]
# Hierarchical optimization settings
enable_hierarchical = true
system_level_weight = 0.4
role_level_weight = 0.35
tool_level_weight = 0.25
conflict_resolution = "priority_based"  # priority_based, weighted_average, consensus

[pattern_recognition]
# Pattern recognition settings
enable_pattern_recognition = true
cycle_detection = true
trend_analysis = true
anomaly_detection = true
pattern_retention_days = 30

[performance_tracking]
# Performance tracking settings
enable_detailed_tracking = true
track_prediction_accuracy = true
track_optimization_impact = true
track_cost_savings = true
export_interval = 3600  # seconds

[logging]
# Logging configuration
level = "INFO"
enable_debug_logs = false
log_optimization_decisions = true
log_performance_metrics = true
log_alert_generation = true
log_file = "realtime_optimization.log"
max_log_size = 10485760  # 10MB
backup_count = 5

[security]
# Security settings
enable_authentication = false
api_key_required = false
allowed_origins = ["*"]
rate_limiting = true
max_requests_per_minute = 1000

[data_retention]
# Data retention policies
metrics_retention_days = 30
optimization_history_days = 90
alert_history_days = 7
pattern_data_days = 30
export_retention_days = 365

[export]
# Export settings
enable_auto_export = true
export_interval = 3600  # seconds
export_format = "json"  # json, csv, parquet
export_directory = "./exports"
compress_exports = true

[health_checks]
# Health check settings
enable_health_checks = true
health_check_interval = 30  # seconds
component_timeout = 10  # seconds
alert_on_unhealthy = true
auto_recovery = true

[scaling]
# Scaling settings
auto_scale_workers = false
max_workers = 10
min_workers = 2
scale_up_threshold = 0.8
scale_down_threshold = 0.2
scaling_cooldown = 300  # seconds

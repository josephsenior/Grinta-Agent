---
# Grafana Alerting Rules for Forge
# 
# These rules trigger alerts when system issues are detected.
# Alerts can be sent via email, Slack, PagerDuty, etc.

apiVersion: 1

groups:
  - name: forge-critical-alerts
    interval: 1m
    rules:
      # High error rate
      - uid: forge-high-error-rate
        title: High Error Rate
        condition: error_rate_high
        data:
          - refId: error_rate
            queryType: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: '(metasop_steps_failed / (metasop_steps_executed + metasop_steps_failed)) * 100'
              refId: error_rate
          - refId: error_rate_high
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [error_rate]
                  type: query
              refId: error_rate_high
        annotations:
          description: 'Error rate is {{ printf "%.2f" $values.error_rate.Value }}% (threshold: 5%)'
          summary: Agent error rate is above 5%
        labels:
          severity: critical
          team: backend
        for: 5m

      # Slow response time
      - uid: forge-slow-response
        title: Slow Response Time (p95)
        condition: latency_high
        data:
          - refId: p95_latency
            queryType: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'metasop_step_duration_ms_p95'
              refId: p95_latency
          - refId: latency_high
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [2000]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [p95_latency]
                  type: query
              refId: latency_high
        annotations:
          description: 'p95 latency is {{ printf "%.0f" $values.p95_latency.Value }}ms (threshold: 2000ms)'
          summary: Agent response time is slow
        labels:
          severity: warning
          team: performance
        for: 10m

      # Low cache hit rate
      - uid: forge-low-cache-hit-rate
        title: Low Cache Hit Rate
        condition: cache_low
        data:
          - refId: cache_rate
            queryType: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: '(metasop_cache_hits / (metasop_cache_hits + metasop_cache_stores)) * 100'
              refId: cache_rate
          - refId: cache_low
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [30]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [cache_rate]
                  type: query
              refId: cache_low
        annotations:
          description: 'Cache hit rate is {{ printf "%.2f" $values.cache_rate.Value }}% (threshold: 30%)'
          summary: Cache efficiency is low
        labels:
          severity: info
          team: performance
        for: 15m

      # EventService RPC error rate high
      - uid: forge-eventservice-error-rate
        title: EventService RPC Error Rate High
        condition: eventservice_error_high
        data:
          - refId: eventservice_error
            queryType: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'forge_eventservice_error_rate_5m'
              refId: eventservice_error
          - refId: eventservice_error_high
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [eventservice_error]
                  type: query
              refId: eventservice_error_high
        annotations:
          description: 'EventService RPC error rate {{ printf "%.2f" $values.eventservice_error.Value }}% (>5%)'
          summary: EventService experiencing elevated failure rate
        labels:
          severity: warning
          team: backend
        for: 5m

      # RuntimeService RPC latency high
      - uid: forge-runtime-latency
        title: RuntimeService RPC Latency High (p95)
        condition: runtime_latency_high
        data:
          - refId: runtime_latency
            queryType: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'histogram_quantile(0.95, sum by (le) (rate(metasop_runtime_rpc_duration_seconds_bucket[5m])))'
              refId: runtime_latency
          - refId: runtime_latency_high
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [runtime_latency]
                  type: query
              refId: runtime_latency_high
        annotations:
          description: 'RuntimeService p95 latency {{ printf "%.2f" $values.runtime_latency.Value }}s (>5s)'
          summary: RuntimeService RPC latency elevated
        labels:
          severity: warning
          team: performance
        for: 10m

  - name: forge-availability-alerts
    interval: 1m
    rules:
      # Low overall success rate (<95%) over 10m
      - uid: forge-low-success-rate
        title: Low Success Rate (5m avg)
        condition: success_rate_low
        data:
          - refId: success_rate
            queryType: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'forge_success_rate_5m'
              refId: success_rate
          - refId: success_rate_low
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [95]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [success_rate]
                  type: query
              refId: success_rate_low
        annotations:
          description: 'Success rate is {{ printf "%.2f" $values.success_rate.Value }}% (threshold: 95%)'
          summary: Overall success rate is low
        labels:
          severity: warning
          team: reliability
        for: 10m
      # Service down
      - uid: forge-service-down
        title: Forge Service Down
        condition: service_down
        data:
          - refId: up_metric
            queryType: prometheus
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'up{job="forge-metasop"}'
              refId: up_metric
          - refId: service_down
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [up_metric]
                  type: query
              refId: service_down
        annotations:
          description: 'Forge MetaSOP service is not responding'
          summary: Critical: Service is down
        labels:
          severity: critical
          team: ops
        for: 2m

      # High retry rate (sign of instability)
      - uid: forge-high-retry-rate
        title: High Retry Rate
        condition: retry_high
        data:
          - refId: retry_rate
            queryType: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: '(metasop_retry_attempts / metasop_steps_executed) * 100'
              refId: retry_rate
          - refId: retry_high
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [20]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [retry_rate]
                  type: query
              refId: retry_high
        annotations:
          description: 'Retry rate is {{ printf "%.2f" $values.retry_rate.Value }}% (threshold: 20%)'
          summary: High retry rate indicates system instability
        labels:
          severity: warning
          team: reliability
        for: 10m

  - name: forge-cost-alerts
    interval: 5m
    rules:
      # High token usage (cost warning)
      - uid: forge-high-token-usage
        title: High Token Usage
        condition: tokens_high
        data:
          - refId: token_rate
            queryType: prometheus
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'rate(metasop_total_tokens[1h])'
              refId: token_rate
          - refId: tokens_high
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1000]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [token_rate]
                  type: query
              refId: tokens_high
        annotations:
          description: 'Token usage rate is {{ printf "%.0f" $values.token_rate.Value }} tokens/sec (threshold: 1000)'
          summary: High token consumption detected
        labels:
          severity: info
          team: cost-optimization
        for: 30m

  - name: forge-new-alerts
    interval: 1m
    rules:
      # Low retry success rate (<60%) indicates retry ineffectiveness
      - uid: forge-low-retry-success-rate
        title: Low Retry Success Rate (5m avg)
        condition: retry_success_low
        data:
          - refId: retry_success_rate
            queryType: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'forge_retry_success_rate_5m'
              refId: retry_success_rate
          - refId: retry_success_low
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [60]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [retry_success_rate]
                  type: query
              refId: retry_success_low
        annotations:
          description: 'Retry success rate is {{ printf "%.2f" $values.retry_success_rate.Value }}% (threshold: 60%)'
          summary: Retries are not recovering failures effectively
        labels:
          severity: warning
          team: reliability
        for: 10m
      # LLM cost spike (>2x daily average)
      - uid: forge-cost-spike
        title: LLM Cost Spike Detected
        condition: cost_spike
        data:
          - refId: daily_cost_avg
            queryType: prometheus
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'avg_over_time(rate(metasop_total_tokens[1h])[24h:])'
              refId: daily_cost_avg
          - refId: current_cost
            queryType: prometheus
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'rate(metasop_total_tokens[1h])'
              refId: current_cost
          - refId: cost_spike
            queryType: math
            datasourceUid: __expr__
            model:
              expression: '$current_cost > ($daily_cost_avg * 2)'
              refId: cost_spike
        annotations:
          description: 'Current cost rate is 2x above daily average - investigate unusual usage'
          summary: LLM cost spike detected
        labels:
          severity: warning
          team: cost-optimization
        for: 15m

      # CodeAct execution failures (>10% error rate)
      - uid: forge-codeact-failures
        title: High CodeAct Failure Rate
        condition: failure_high
        data:
          - refId: failure_rate
            queryType: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: '(metasop_steps_failed / (metasop_steps_executed + metasop_steps_failed)) * 100'
              refId: failure_rate
          - refId: failure_high
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [failure_rate]
                  type: query
              refId: failure_high
        annotations:
          description: 'CodeAct failure rate is {{ printf "%.2f" $values.failure_rate.Value }}% (threshold: 10%)'
          summary: CodeAct agent experiencing high failure rate
        labels:
          severity: critical
          team: engineering
        for: 10m

      # File edit failures
      - uid: forge-file-edit-failures
        title: File Edit Failures
        condition: edit_failures
        data:
          - refId: edit_fails
            queryType: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'increase(metasop_steps_failed{operation="file_edit"}[5m])'
              refId: edit_fails
          - refId: edit_failures
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [edit_fails]
                  type: query
              refId: edit_failures
        annotations:
          description: '{{ printf "%.0f" $values.edit_fails.Value }} file edit failures in last 5 minutes'
          summary: Multiple file edit operations failing
        labels:
          severity: warning
          team: engineering
        for: 5m

      # Quota exceeded events
      - uid: forge-quota-exceeded
        title: User Quota Exceeded
        condition: quota_exceeded
        data:
          - refId: quota_events
            queryType: prometheus
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'increase(metasop_status_count{status="quota_exceeded"}[1h])'
              refId: quota_events
          - refId: quota_exceeded
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [quota_events]
                  type: query
              refId: quota_exceeded
        annotations:
          description: '{{ printf "%.0f" $values.quota_events.Value }} quota exceeded events in last hour'
          summary: Multiple users hitting quota limits
        labels:
          severity: info
          team: product
        for: 30m

      # Database connection errors
      - uid: forge-db-errors
        title: Database Connection Errors
        condition: db_errors
        data:
          - refId: db_error_count
            queryType: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'increase(metasop_suppressed_errors{error_type="database"}[5m])'
              refId: db_error_count
          - refId: db_errors
            queryType: threshold
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [3]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [db_error_count]
                  type: query
              refId: db_errors
        annotations:
          description: '{{ printf "%.0f" $values.db_error_count.Value }} database errors in last 5 minutes'
          summary: Database connection issues detected
        labels:
          severity: critical
          team: ops
        for: 5m


<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <script>
      // Performance API polyfill for React scheduler - must run before any modules load
      if (typeof performance === 'undefined') {
        window.performance = {
          now: function() { return Date.now(); }
        };
      }
      // Defensive: provide a global lucide object if an external script/extension
      // tries to register icons like lucide.Activity on the window.
      // This prevents "Cannot set properties of undefined (setting 'Activity')" from
      // third-party injections expecting a global registry.
      window.lucide = window.lucide || {};
    </script>
    <link rel="icon" type="image/png" href="/forge-icon.png" />
    <link rel="apple-touch-icon" href="/forge-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#8b5cf6" />
    <title>Forge - AI Development Platform</title>
    <meta name="description" content="Build software faster with Forge, the AI-powered development platform. Advanced agents, real-time collaboration, and intelligent code generation." />
    <meta name="keywords" content="AI development, code generation, software development, AI agents, development platform, coding assistant" />
    <meta name="author" content="Forge" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Forge - AI Development Platform" />
    <meta property="og:description" content="Forge your software with AI - Code less, build more. Advanced AI agents, real-time collaboration, and intelligent code generation." />
    <meta property="og:site_name" content="Forge" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Forge - AI Development Platform" />
    <meta name="twitter:description" content="Build software faster with Forge, the AI-powered development platform." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

  EXAMPLE OF BAD OUTPUT:
  {
    "ok": true,
    "tests": {"passed": 1, "failed": 0},
    "lint": {},
    "report": []
  }
  
  WHY IT'S BAD:
  - No detailed test_results array (missing individual test scenarios)
  - Generic summary without specifics
  - No coverage metrics
  - No security or performance findings
  - Missing test categories and priorities

quality_constraints:
  - Minimum 5 end-to-end test scenarios covering critical user flows
  - Minimum 10 total test cases across all types (unit, integration, e2e)
  - Each test must have name, detailed description, status, type, category, priority
  - Coverage metrics must be realistic (70-90% for new code, 60-80% for legacy)
  - Lint results must show specific issues if status is not "clean"
  - Report array must summarize findings by category with recommendations
  - Security findings must be included if any vulnerabilities identified
  - Performance metrics should include API response times and page load times

best_practices: |
  Testing Pyramid:
  - 70% Unit tests: Fast, isolated, test individual functions/components
  - 20% Integration tests: Test API endpoints with database, service interactions
  - 10% E2E tests: Test complete user flows through UI, slow but comprehensive
  
  Test Scenario Design (AAA Pattern):
  - Arrange: Set up test data and preconditions
  - Act: Execute the action being tested
  - Assert: Verify expected outcome
  
  Test Coverage:
  - Focus on critical paths and business logic (100% coverage not always necessary)
  - Test happy paths (expected user behavior)
  - Test edge cases (boundary conditions, empty inputs, max values)
  - Test error paths (invalid inputs, network failures, unauthorized access)
  
  Test Naming:
  - Use descriptive names that explain what is being tested
  - Include expected outcome in name ("Login Fails with Invalid Password")
  - Group related tests by category (authentication, api, security)
  
  Security Testing:
  - Test authentication and authorization thoroughly
  - Verify input validation and sanitization
  - Check for common vulnerabilities (SQL injection, XSS, CSRF)
  - Test rate limiting and DDoS protection
  - Verify sensitive data is not exposed
  
  Performance Testing:
  - Measure API response times (target < 200ms p95)
  - Test with realistic data volumes
  - Identify slow database queries
  - Verify caching effectiveness
  
  Test Independence:
  - Each test should be runnable in isolation
  - Tests should not depend on execution order
  - Clean up test data after each test
  - Use factories or fixtures for test data

validation_checklist: |
  Before submitting, verify:
  - [ ] ok field accurately reflects overall test status
  - [ ] tests object has passed, failed, and total counts
  - [ ] test_results array has minimum 5 e2e scenarios
  - [ ] Each test has all required fields: name, test, status, type, category, priority
  - [ ] Test descriptions are detailed and explain expected behavior
  - [ ] Coverage metrics are realistic percentages (not 0% or 100%)
  - [ ] lint object shows actual status ("clean", "warnings", or "errors")
  - [ ] If lint status is not clean, issues array has specific problems
  - [ ] report array summarizes findings by category
  - [ ] security_findings included if any vulnerabilities found
  - [ ] performance_metrics includes response times and recommendations
  - [ ] Tests cover happy paths, edge cases, and error scenarios
  - [ ] Critical user flows have "critical" or "high" priority tests
  - [ ] Output structure matches qa.schema.json exactly

constraints:
  - Deterministic reports only (no randomness in test results)
  - Tests must be realistic and actually implementable
  - Coverage percentages should reflect achievable targets
  - Security tests must cover OWASP Top 10 where applicable
  - Performance benchmarks should align with modern web standards
  - All critical user flows must have corresponding e2e tests
  - Edge cases and error scenarios must be included, not just happy paths

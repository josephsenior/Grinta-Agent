syntax = "proto3";

package forge.events.v1;

import "google/protobuf/empty.proto";
option go_package = "github.com/forge/events/v1;eventsv1";

// Metadata describing a client session.
message SessionInfo {
  string session_id = 1;
  string user_id = 2;
  string repository = 3;
  string branch = 4;
  map<string, string> labels = 5;
}

// Request to start a new session and initialise the event stream contract.
message StartSessionRequest {
  string user_id = 1;
  string repository = 2;
  string branch = 3;
  map<string, string> labels = 4;
  string session_id = 5;
}

// Generic event envelope mirroring forge.events.stream.Event.
message EventEnvelope {
  string session_id = 1;
  int64 event_id = 2;
  string event_type = 3;
  bytes payload = 4; // JSON-encoded canonical event payload
  string trace_id = 5;
  map<string, string> metadata = 6;
}

// Request to publish a single event to the session stream.
message PublishEventRequest {
  EventEnvelope event = 1;
}

// Request for a streaming subscription.
message SubscribeRequest {
  string session_id = 1;
  repeated string event_types = 2;
  int64 cursor = 3; // optional position token
}

// Request to replay a portion of the event log.
message ReplayRequest {
  string session_id = 1;
  int64 from_cursor = 2;
  uint32 limit = 3;
}

// Response chunk for replay pagination.
message ReplayChunk {
  repeated EventEnvelope events = 1;
  int64 next_cursor = 2;
  bool has_more = 3;
}

service EventService {
  rpc StartSession(StartSessionRequest) returns (SessionInfo);
  rpc PublishEvent(PublishEventRequest) returns (google.protobuf.Empty);
  rpc Subscribe(SubscribeRequest) returns (stream EventEnvelope);
  rpc Replay(ReplayRequest) returns (stream ReplayChunk);
}

[settings]
# Black compatibility
profile = black
line_length = 120

# Import grouping
known_first_party = Forge
known_third_party = pytest,litellm,pydantic,fastapi,docker,kubernetes,sqlalchemy,pandas,numpy

# Formatting
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True

# Skip patterns
skip_glob = .venv/*,.venv-wsl-backup/*,node_modules/*,.git/*,build/*,dist/*,*.egg-info/*

# Sections
sections = FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,LOCALFOLDER



[core]
workspace_base = "."
sandbox_volumes = [".:/workspace:rw"]
# Persist trajectories for replay/analysis
save_trajectory_path = "./trajectories"


# ============================================================================
# MCP (Model Context Protocol) CONFIGURATION - PRODUCTION
# ============================================================================
# Best Practice: Use SSE proxy servers via SuperGateway for production
# Direct stdio servers are NOT recommended for production (reliability issues)
#
# Start SuperGateway proxies separately (one terminal per server):
#   Terminal 1: supergateway --stdio "npx @jpisnice/shadcn-ui-mcp-server" --port 8090
#   Terminal 2: supergateway --stdio "uvx mcp-server-fetch" --port 8093
#   Terminal 3: supergateway --stdio "python -m mcp_server_duckduckgo" --port 8094
#   Terminal 4: supergateway --stdio "npx @modelcontextprotocol/server-playwright" --port 8095
#
# Then reference the SSE endpoints below:
# ============================================================================

[mcp]
# ============================================================================
# SSE SERVERS (RECOMMENDED FOR PRODUCTION)
# ============================================================================
sse_servers = [
    # shadcn/ui Components (React/Svelte/Vue) - UI component library access
    "http://localhost:8090/sse",
    
    # Fetch - HTTP requests and API calls (recommended - lightweight)
    # "http://localhost:8093/sse",
    
    # DuckDuckGo - Free web search (no API key needed)
    # "http://localhost:8094/sse",
    
    # Playwright - Browser automation (uncomment when needed - heavyweight)
    # "http://localhost:8095/sse",
]

# ============================================================================
# STDIO SERVERS (DEVELOPMENT ONLY - NOT RECOMMENDED FOR PRODUCTION)
# ============================================================================
# Use these only for development/testing. For production, use SSE proxies above.
# Common issues with stdio: process crashes, deadlocks, resource leaks, hard to debug.
#
# Development MCP Servers (stdio mode):
stdio_servers = [
    # shadcn-ui - Fast UI component library (bolt.new-like speed)
    { name = "shadcn-ui", command = "npx", args = ["-y", "@jpisnice/shadcn-ui-mcp-server"], 
      env = { "FRAMEWORK" = "react" } },
    
    # Fetch - Fast HTTP retrieval (Priority #1 for web content)
    { name = "fetch", command = "uvx", args = ["mcp-server-fetch"] },
    
    # DuckDuckGo - Free web search (no API key needed)
    # Note: Install with: pip install duckduckgo-search
    # Then uncomment:
    # { name = "duckduckgo", command = "python", args = ["-m", "mcp_server_duckduckgo"] },
    
    # Playwright - Browser automation (LAST RESORT - heavy, 500MB RAM per instance)
    # Uncomment ONLY when form filling or JS-heavy pages are required
    # { name = "playwright", command = "npx", args = ["-y", "@modelcontextprotocol/server-playwright"] },
]

# ============================================================================
# ADDITIONAL MCP SERVERS AVAILABLE VIA MARKETPLACE (1,500+)
# ============================================================================
# Install via UI: Settings → MCP → Marketplace
#
# Popular categories:
# 🌐 Browser: Playwright, Chrome DevTools, Puppeteer
# 🗄️ Database: PostgreSQL, MySQL, SQLite, MongoDB  
# ☁️ Cloud: AWS, Azure, GCP
# 🤖 AI Tools: LLM integrations, RAG, embeddings
# 💻 Development: Git, GitHub, Docker, VS Code
# ⚡ Productivity: Memory, context, workflow automation
# 📁 File System: Local files, Google Drive, Dropbox
# 🔌 API Integration: REST, GraphQL, webhooks
# 🧪 Testing: Jest, Mocha, Cypress
# 📊 Monitoring: Sentry, logging, observability
# 🔒 Security: Authentication, secrets, vault
# 💬 Communication: Slack, Discord, email
#
# Total available: 1,500+ servers (zero config, 100% free)
# ============================================================================

# ============================================================================
# PRODUCTION-OPTIMIZED LLM CONFIGURATION
# ============================================================================
[llm]
# Default to GPT-4o-mini for cost efficiency; UI/Session can override
model = "gpt-4o-mini"
temperature = 0.1
timeout = 120
# Allow larger completions for complex tasks
max_output_tokens = 4096
caching_prompt = true
disable_vision = true
drop_params = true

# PRODUCTION: Enhanced retry configuration for reliability
num_retries = 8
retry_min_wait = 15
retry_max_wait = 120
retry_multiplier = 2.0

# Reduce unnecessary refusals on code tasks (Gemini safety config)
safety_settings = [
    { category = "HARM_CATEGORY_HARASSMENT", threshold = "BLOCK_NONE" },
    { category = "HARM_CATEGORY_HATE_SPEECH", threshold = "BLOCK_NONE" },
    { category = "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold = "BLOCK_NONE" },
    { category = "HARM_CATEGORY_DANGEROUS_CONTENT", threshold = "BLOCK_NONE" }
]

# API key management (use environment variable for security)
# api_key set via FORGE_API_KEY environment variable

# ============================================================================
# CONDENSER CONFIGURATION (PRODUCTION)
# ============================================================================
[condenser]
# Use LLM summarization to keep relevant context for larger projects
# This prevents context overflow while maintaining quality
type = "llm"
llm_config = "condenser"
keep_first = 1
max_size = 200

# Condenser LLM configuration (use efficient model for summarization)
[llm.condenser]
model = "gpt-4o-mini"
temperature = 0.1
timeout = 60
max_output_tokens = 2048

# ============================================================================
# HEAVY LLM PROFILE (for complex tasks)
# ============================================================================
[llm.heavy]
# Heavy profile for planning/finalization
model = "gemini-2.5-pro"
temperature = 0.1
timeout = 180
max_output_tokens = 8192
caching_prompt = true
num_retries = 8
retry_min_wait = 15
retry_max_wait = 120

# ============================================================================
# AGENT CONFIGURATION (PRODUCTION-OPTIMIZED)
# ============================================================================
agent_mode = "simple"

[agent]
schema_version = "2025-11-14"

[runtime_pool]
enabled = true

[runtime_pool.default]
max_size = 2
ttl_seconds = 600

# Example override:
# [runtime_pool.overrides.docker]
# max_size = 4
# ttl_seconds = 900
llm_config = 'llm'

# ============================================================================
# PROMPT CONFIGURATION - USE OPTIMIZED PROMPTS!
# ============================================================================
# CodeActAgent: Use "system_prompt_forge.j2" (most optimized, tested prompt)
# ReadOnlyAgent: Use "system_prompt_ultimate.j2"
system_prompt_filename = "system_prompt_forge.j2"

# ============================================================================
# TOOL CONFIGURATION
# ============================================================================
enable_browsing = true
enable_llm_editor = false                  # Deprecated - use ultimate_editor
enable_ultimate_editor = true              # ⚡ Tree-sitter editor (40+ languages)
enable_editor = true                       # Fallback str_replace_editor
enable_jupyter = false                     # Disable in production unless needed
enable_cmd = true
enable_think = true
enable_finish = true
enable_history_truncation = true
enable_condensation_request = true         # Enable for long conversations
enable_prompt_extensions = true
enable_mcp = true

# ============================================================================
# AUTONOMY SETTINGS (PRODUCTION)
# ============================================================================
autonomy_level = "balanced"                # More controlled than "full"
auto_retry_on_error = true
max_autonomous_iterations = 100            # Increased for production
enable_internal_task_tracker = true
stuck_detection_enabled = true
stuck_threshold_iterations = 5

# ============================================================================
# SANDBOX CONFIGURATION (PRODUCTION)
# ============================================================================
[sandbox]
enable_auto_lint = true
keep_runtime_alive = true  # PRODUCTION: Keep alive for better performance
use_host_network = false  # Windows Docker Desktop: use bridge network
runtime_container_image = "forge-runtime:latest"

# Production timeouts
timeout = 120
close_delay = 600  # 10 minutes before closing idle runtimes

# Resource limits for production
# Uncomment and adjust based on your infrastructure
# max_concurrent_conversations = 10
# conversation_max_age_seconds = 86400  # 24 hours

# ============================================================================
# METASOP CONFIGURATION (PRODUCTION-OPTIMIZED)
# ============================================================================
[metasop]
enabled = true
default_sop = "feature_delivery_with_ui"

# PRODUCTION: Increased token budgets for complex tasks
token_budget_soft = 50000
token_budget_hard = 100000

# Monitoring and metrics
metrics_prometheus_port = 9154

# PRODUCTION: All advanced features enabled
enable_vector_memory = true
enable_hybrid_retrieval = true
enforce_capability_matrix = true
enable_self_remediation = true
enable_failure_taxonomy = true  # New feature for error classification

# Micro-iterations: Enable for UI/frontend tasks
enable_micro_iterations = true
micro_iteration_max_loops = 8
micro_iteration_no_change_limit = 3

# Vector memory configuration
vector_embedding_dim = 384
memory_max_records = 10000

# ============================================================================
# ACE FRAMEWORK (Agentic Context Engineering) - PRODUCTION
# ============================================================================
# Self-improving AI that learns from its own performance through evolving
# context playbooks. Prevents context collapse and accumulates domain knowledge.

enable_ace = true
ace_max_bullets = 2000  # Larger playbook for production
ace_playbook_persistence_path = "./ace_playbooks/metasop/"

# Multi-epoch training for continuous improvement
ace_multi_epoch = true
ace_num_epochs = 5
ace_reflector_max_iterations = 5

# Online adaptation: Real-time learning during task execution
ace_enable_online_adaptation = true
ace_min_helpfulness_threshold = 0.0

# Context management
ace_max_playbook_content_length = 100  # More context in production

# Grow-and-refine: Automatic playbook maintenance
ace_enable_grow_and_refine = true
ace_cleanup_interval_days = 30
ace_redundancy_threshold = 0.8

# Automatic playbook persistence
ace_auto_save_playbook = true
ace_playbook_save_interval = 10  # Save every 10 updates

# ============================================================================
# ADVANCED PERFORMANCE FEATURES (EXPERIMENTAL - HIGH IMPACT)
# ============================================================================

# 🚀 Prompt Optimization - Self-improving prompts via A/B testing
enable_prompt_optimization = true
prompt_optimization_ab_split = 0.1          # 10% traffic for A/B testing
prompt_optimization_min_samples = 10        # Minimum samples before optimization
prompt_optimization_confidence_threshold = 0.8

# ⚡ Parallel Execution - Run independent steps concurrently
enable_parallel_execution = true
max_parallel_workers = 4                    # Number of parallel workers
async_max_concurrent_steps = 10             # Max concurrent async operations

# 🔮 Predictive Planning - Pre-execution optimization & conflict prevention
enable_predictive_planning = true
predictive_max_prediction_time_ms = 100     # Max time for prediction
predictive_confidence_threshold = 0.7       # Confidence threshold for predictions

# 🔄 Collaborative Streaming - Real-time context sharing between agents
enable_collaborative_streaming = true
streaming_max_queue_size = 10000
streaming_processing_batch_size = 100

# ============================================================================
# MEMORY CONFIGURATION (PRODUCTION)
# ============================================================================
[memory]
# Enable advanced memory features
enable_memory = true
max_conversations = 1000
retention_days = 30

# Vector database configuration
vector_db_type = "chromadb"
enable_semantic_search = true

# ============================================================================
# REDIS & DISTRIBUTED CACHING (FOR SCALING TO 1000+ USERS)
# ============================================================================
# Enable Redis for multi-instance deployments and high concurrency
# Prerequisites: Redis server running, set environment variables:
#   export REDIS_HOST=localhost
#   export REDIS_PORT=6379
#   export REDIS_PASSWORD=your-password  # optional
#
# Benefits:
# - Shared cache across multiple backend instances
# - Support for 1000+ concurrent users
# - Session data persistence
# - File/graph caching
# - LRU eviction
# - Connection pooling (100 max connections)
#
# Install: pip install redis
# Run Redis: docker run -d -p 6379:6379 redis:latest
# Or: brew install redis && redis-server (macOS)
# Or: sudo apt install redis-server && sudo systemctl start redis (Linux)

[redis]
enabled = false                              # Set to true when Redis is running
host = "localhost"                           # Or set via REDIS_HOST env var
port = 6379
password = ""                                # Or set via REDIS_PASSWORD env var
db = 0
ttl_seconds = 3600                           # 1 hour default TTL
max_connections = 100                        # Connection pool size (for 1000+ users)

# Redis usage:
# - Distributed cache (file cache, graph cache)
# - Session storage
# - Rate limiting counters
# - Shared state across instances

# ============================================================================
# AUTO-SCALING CONFIGURATION (PRODUCTION)
# ============================================================================
# Automatic worker scaling based on load
[scaling]
auto_scale_workers = false                   # Enable for high-traffic production
max_workers = 10                             # Maximum concurrent workers
min_workers = 2                              # Minimum workers to maintain
scale_up_threshold = 0.8                     # Scale up when >80% capacity
scale_down_threshold = 0.2                   # Scale down when <20% capacity
scaling_cooldown = 300                       # Wait 5min between scaling actions

# Worker scaling formula:
# current_load = active_tasks / max_workers
# if current_load > scale_up_threshold: add workers
# if current_load < scale_down_threshold: remove workers

# ============================================================================
# OPTIMIZATION CONFIGURATION (PRODUCTION)
# ============================================================================
[optimization]
enable_optimization = true
enable_real_time_optimization = true
ab_split = 0.1
min_samples = 10
confidence_threshold = 0.8

# Real-time optimization thresholds
optimization_threshold = 0.05
real_time_confidence_threshold = 0.8

# ============================================================================
# MONITORING & LOGGING (PRODUCTION)
# ============================================================================
[logging]
level = "INFO"  # Use WARNING for high-traffic production
format = "json"
enable_performance_logging = true
enable_error_tracking = true

# ============================================================================
# SECURITY CONFIGURATION (PRODUCTION)
# ============================================================================
[security]
# Enable confirmation mode for sensitive operations
confirmation_mode = false  # Set to true for extra safety
security_analyzer = "llm"
enable_security_analyzer = true

# Rate limiting
enable_rate_limiting = true
rate_limit_requests = 100
rate_limit_window = 60

# ============================================================================
# PERFORMANCE TUNING (PRODUCTION)
# ============================================================================

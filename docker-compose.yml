services:
  redis:
    image: redis:7-alpine
    container_name: forge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  forge:
    build:
      context: ./
      dockerfile: ./backend/containers/app/Dockerfile
    image: forge:latest
    container_name: forge-app-${DATE:-}
    environment:
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=${SANDBOX_RUNTIME_CONTAINER_IMAGE:-forge-runtime:latest}
      - SANDBOX_USER_ID=${SANDBOX_USER_ID:-1000}
      - WORKSPACE_MOUNT_PATH=${WORKSPACE_BASE:-$PWD/workspace}
      - CONFIG_FILE=/app/config.toml
      - CSP_POLICY=strict
      - DOCKER_HOST_ADDR=host.docker.internal
      - SANDBOX_API_HOSTNAME=host.docker.internal
      - SANDBOX_VOLUMES=${SANDBOX_VOLUMES:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DESIRED_NUM_WARM_SERVERS=2
      - INIT_PLUGIN_TIMEOUT=60
      - SKIP_DEPENDENCY_CHECK=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - FORGE_EVENT_SERVICE_GRPC=${FORGE_EVENT_SERVICE_GRPC:-false}
      - FORGE_RUNTIME_SERVICE_GRPC=${FORGE_RUNTIME_SERVICE_GRPC:-false}
      - FORGE_EVENT_SERVICE_ENDPOINT=${FORGE_EVENT_SERVICE_ENDPOINT:-}
      - FORGE_RUNTIME_SERVICE_ENDPOINT=${FORGE_RUNTIME_SERVICE_ENDPOINT:-}
      # User Storage Configuration
      - USER_STORAGE_TYPE=${USER_STORAGE_TYPE:-database}
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-forge}
      - DB_USER=${DB_USER:-forge}
      - DB_PASSWORD=${DB_PASSWORD:-forge}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/monitoring/readiness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.forge:/.forge
      - ~/.Forge:/.Forge # Legacy support for migration
      - ${WORKSPACE_BASE:-$PWD/workspace}:/opt/workspace_base
      - ./config.toml:/app/config.toml:ro
    depends_on:
      redis:
        condition: service_healthy
    pull_policy: build
    stdin_open: true
    tty: true

volumes:
  redis-data: {}

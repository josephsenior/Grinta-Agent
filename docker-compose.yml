# ============================================================================
# Forge — Docker Compose
# ============================================================================
# Quick start:   docker compose up
# With rebuild:  docker compose up --build
# Background:    docker compose up -d
# With extras:   docker compose --profile database up
# ============================================================================

services:
  forge:
    build: .
    ports:
      - "${FORGE_PORT:-3000}:3000"
    volumes:
      - ./workspace:/app/workspace          # Persist agent workspace
      - ./config.toml:/app/config.toml:ro   # Mount your config (optional)
    environment:
      - SESSION_API_KEY=${SESSION_API_KEY:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
    restart: unless-stopped

  # Optional: PostgreSQL for conversation/KB storage
  # Activate with: docker compose --profile database up
  postgres:
    image: postgres:16-alpine
    profiles: ["database"]
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

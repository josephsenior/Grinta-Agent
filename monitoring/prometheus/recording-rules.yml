groups:
  - name: forge_route_metrics
    interval: 30s
    rules:
      - record: forge_http_rps:route
        expr: sum by (route) (rate(forge_request_total{status!="exception"}[1m]))
      - record: forge_http_error_rate_percent:route
        expr: 100 * sum by (route) (rate(forge_request_total{status=~"5.."}[5m])) / sum by (route) (rate(forge_request_total{status!="exception"}[5m]))
      - record: forge_http_latency_p95_ms:route
        expr: histogram_quantile(0.95, sum by (le, route) (rate(forge_request_duration_ms_bucket[5m])))
      - record: forge_http_latency_p50_ms:route
        expr: histogram_quantile(0.50, sum by (le, route) (rate(forge_request_duration_ms_bucket[5m])))
      - record: forge_http_latency_p99_ms:route
        expr: histogram_quantile(0.99, sum by (le, route) (rate(forge_request_duration_ms_bucket[5m])))
  - name: forge_global_http
    interval: 30s
    rules:
      - record: forge_http_rps
        expr: sum(rate(forge_request_total{status!="exception"}[1m]))
      - record: forge_http_error_rate_percent
        expr: 100 * sum(rate(forge_request_total{status=~"5.."}[5m])) / sum(rate(forge_request_total{status!="exception"}[5m]))
      - record: forge_http_latency_p95_ms
        expr: histogram_quantile(0.95, sum by (le) (rate(forge_request_duration_ms_bucket[5m])))

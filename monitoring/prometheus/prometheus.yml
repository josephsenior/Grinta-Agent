# Prometheus configuration for Forge

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'forge-monitor'

# Recording and alerting rules
rule_files:
  - 'recording-rules.yml'

# Scrape configs

scrape_configs:
  # MetaSOP Prometheus metrics (from forge/metasop/metrics.py)
  - job_name: 'forge-metasop'
    static_configs:
      - targets: ['host.docker.internal:9091']  # Adjust port if needed
        labels:
          service: 'metasop'
          component: 'orchestrator'

  # REST API monitoring endpoint
  - job_name: 'forge-api'
    metrics_path: '/api/monitoring/metrics-prom'
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: 'api'
          component: 'backend'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          component: 'monitoring'

# Optional: Add alerting rules
# rule_files:
#   - 'alert_rules.yml'


[pytest]
addopts = -q --maxfail=5

# Ignore heavy or system-dependent test directories by default
# evaluation: evaluation benchmarks (vllm etc.)
# e2e/runtime: end-to-end and runtime tests requiring Docker/tmux/powershell
python_files = test_*.py *_test.py

norecursedirs =
	.git
	.venv
	venv
	node_modules
	dist
	build
	backend/tests/e2e
	backend/tests/runtime
	backend/tests/stress
